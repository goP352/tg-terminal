<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trade Guard PRO Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Общие переменные для цветов */
        :root { 
            --bg: #0b0e11; 
            --card: #1e2329; 
            --text: #eaecef; 
            --accent: #f0b90b; 
            --green: #02d1a0; 
            --red: #f6465d; 
            --border: #2b3139; 
        }
        
        body { 
            font-family: 'Roboto', sans-serif; /* Можно использовать 'Roboto' или другие системные */
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; /* Отступы по краям */
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow-y: auto; /* Теперь прокрутка точно работает */
            -webkit-overflow-scrolling: touch; /* Плавный скролл для iOS */
            gap: 10px; /* Отступы между основными блоками */
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px; 
            border-bottom: 1px solid var(--border); 
            margin-bottom: 5px;
        }
        .balance-box { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            margin: 5px 0; 
            border: 1px solid var(--border); 
        }
        .balance-val { 
            font-size: 22px; 
            font-weight: bold; 
            color: white; 
        }

        /* Вкладки */
        .tabs { 
            display: flex; 
            gap: 5px; 
            margin-bottom: 10px; 
            background: var(--card); 
            border-radius: 8px; 
            padding: 5px; 
        }
        .tab { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            font-size: 13px; 
            cursor: pointer; 
            border-radius: 6px; 
            transition: background-color 0.2s;
        }
        .tab.active { 
            background: var(--border); 
            color: var(--accent); 
        }

        /* Адаптивный основной контент */
        .main-content { 
            display: flex;
            flex-direction: column; /* По умолчанию в колонку для мобильных */
            gap: 10px; 
            flex-grow: 1; 
        }
        @media (min-width: 768px) { /* Для планшетов и ПК */
            body { padding: 20px; }
            .main-content { 
                flex-direction: row; /* В ряд для широких экранов */
                max-width: 1200px; /* Ограничиваем ширину, чтобы не было слишком растянуто */
                margin: 0 auto;
            } 
            .chart-container { 
                flex: 2; /* График занимает 2/3 ширины */
                height: 500px; /* Большая высота для ПК */
            } 
            .trade-box { 
                flex: 1; /* Панель торгов занимает 1/3 ширины */
                min-width: 300px;
            }
        }

        .chart-container { 
            height: 350px; /* Базовая высота для графика */
            background: #161a1e; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
        }
        .trade-box { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            margin-bottom: 15px; 
        }
        label { 
            font-size: 12px; 
            color: #848e9c; 
        }
        select, input { 
            background: #2b3139; 
            border: 1px solid #474d57; 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 15px; 
            width: 100%; /* Занимает всю доступную ширину */
            box-sizing: border-box; /* padding не увеличивает ширину */
        }

        .leverage-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 5px; 
            margin-bottom: 15px; 
        }
        .lev-btn { 
            background: #2b3139; 
            border: 1px solid #474d57; 
            color: white; 
            padding: 5px; 
            border-radius: 4px; 
            font-size: 11px; 
            cursor: pointer; 
            transition: background-color 0.2s, border-color 0.2s;
        }
        .lev-btn:hover { background-color: #3a424b; }
        .lev-btn.active { 
            border-color: var(--accent); 
            color: var(--accent); 
            background-color: #3d3b33;
        }

        .btn-group { 
            display: flex; 
            gap: 10px; 
            margin-top: 10px; 
        }
        button.action { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }
        .buy:hover { opacity: 0.8; }
        .sell:hover { opacity: 0.8; }

        #orders-section, #history-section {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 50px; /* Отступ снизу для скролла */
        }

        .pos-card { 
            background: var(--card); 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 5px; 
            border-left: 4px solid var(--green); /* Зеленая полоска для LONG */
            font-size: 12px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pos-card.short { border-left: 4px solid var(--red); } /* Красная для SHORT */
        .pos-card span { display: block; }
        .pos-card .symbol { font-weight: bold; font-size: 14px; }
        .pos-card
.details { color: #848e9c; }
    </style>
</head>
<body>
    <div class="header">
        <span style="color: var(--accent); font-weight: bold;">PRO TERMINAL v5.5 (FINAL)</span>
        <span id="user-id" style="font-size: 11px; color: #848e9c;"></span>
    </div>

    <div class="balance-box">
        <div style="font-size: 12px; color: #848e9c;">Доступный баланс</div>
        <div class="balance-val" id="current-balance">10,000.00 USDT</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('trade', this)">Трейдинг</div>
        <div class="tab" onclick="switchTab('orders', this)">Открытые сделки</div>
        <div class="tab" onclick="switchTab('history', this)">История ордеров</div>
    </div>

    <!-- Раздел "Трейдинг" -->
    <div id="trade-section" class="main-content">
        <div class="chart-container">
            <iframe id="widget" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=60&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <label>Инструмент</label>
                <select id="asset" onchange="updateChart()">
                    <option value="BTCUSDT">BTC/USDT</option>
                    <option value="ETHUSDT">ETH/USDT</option>
                    <option value="SOLUSDT">SOL/USDT</option>
                    <option value="BNBUSDT">BNB/USDT</option>
                </select>
            </div>

            <div class="input-group">
                <label>Кредитное плечо</label>
                <div class="leverage-grid">
                    <button class="lev-btn active" onclick="setLev(1, this)">x1</button>
                    <button class="lev-btn" onclick="setLev(5, this)">x5</button>
                    <button class="lev-btn" onclick="setLev(10, this)">x10</button>
                    <button class="lev-btn" onclick="setLev(20, this)">x20</button>
                    <button class="lev-btn" onclick="setLev(50, this)">x50</button>
                    <button class="lev-btn" onclick="setLev(75, this)">x75</button>
                    <button class="lev-btn" onclick="setLev(100, this)">x100</button>
                    <button class="lev-btn" onclick="setLev(125, this)">x125</button>
                </div>
            </div>

            <div class="input-group">
                <label>Количество (USDT)</label>
                <input type="number" id="amount" placeholder="Например: 100" value="100" step="1">
            </div>

            <div class="btn-group">
                <button class="action buy" onclick="processTrade('buy')">LONG</button>
                <button class="action sell" onclick="processTrade('sell')">SHORT</button>
            </div>
        </div>
    </div>

    <!-- Раздел "Открытые сделки" -->
    <div id="orders-section" style="display:none;" class="main-content">
        <div id="open-positions-list" style="width: 100%;">
            <div style="text-align: center; padding: 20px; color: #848e9c;">Нет активных позиций.</div>
        </div>
    </div>

    <!-- Раздел "История ордеров" -->
    <div id="history-section" style="display:none;" class="main-content">
        <div id="trade-history-list" style="width: 100%;">
            <div style="text-align: center; padding: 20px; color: #848e9c;">История ордеров пуста.</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        let currentLeverage = 1;
        document.getElementById('user-id').innerText = `ID: ${tg.initDataUnsafe.user?.id || 'Demo'}`;function switchTab(tabName, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('trade-section').style.display = 'none';
            document.getElementById('orders-section').style.display = 'none';
            document.getElementById('history-section').style.display = 'none';

            document.getElementById(`${tabName}-section`).style.display = 'flex'; // Используем flex для main-content

            // Можно добавить логику загрузки данных для Orders и History здесь
            // Например: if (tabName === 'orders') loadOpenOrders();
        }

        function setLev(val, el) {
            currentLeverage = val;
            document.querySelectorAll('.leverage-grid .lev-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function updateChart() {
            const sym = document.getElementById('asset').value;
            document.getElementById('widget').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE%3A${sym}&interval=60&theme=dark`;
        }

        function processTrade(side) {
            const amount = document.getElementById('amount').value;
            const asset = document.getElementById('asset').value;
            
            if(!amount || parseFloat(amount) <= 0) { 
                tg.showAlert("Пожалуйста, введите корректное количество для сделки!"); 
                return; 
            }

            // Добавляем имитацию сделки в раздел "Открытые сделки"
            const openPositionsList = document.getElementById('open-positions-list');
            const newPosId = `pos-${Date.now()}`;
            openPositionsList.innerHTML = `<div id="${newPosId}" class="pos-card ${side}">
                                            <span class="symbol">${asset.replace('USDT', '')}/${side.toUpperCase()} (x${currentLeverage})</span>
                                            <span class="details">Сумма: ${amount} USDT</span>
                                            <span style="color: var(--accent);">ОЖИДАНИЕ...</span>
                                        </div>` + (openPositionsList.innerHTML === `<div style="text-align: center; padding: 20px; color: #848e9c;">Нет активных позиций.</div>` ? '' : openPositionsList.innerHTML);
            
            // Показываем подтверждение Telegram
            tg.showConfirm(`Вы хотите открыть ${side.toUpperCase()} на ${amount} USDT по ${asset} с плечом x${currentLeverage}?`, (ok) => {
                if(ok) {
                    const data = {
                        action: side,
                        symbol: asset.replace('USDT', '/USDT'), // Отправляем в формате BTC/USDT
                        amount: parseFloat(amount),
                        leverage: currentLeverage,
                        type: 'market' // Пока только рыночные ордера
                    };
                    
                    // Уведомляем пользователя об отправке, затем отправляем данные боту (закроет Mini App)
                    tg.showAlert(`Ваш ордер ${side.toUpperCase()} ${asset.replace('USDT', '')} на ${amount} USDT отправлен!`, () => {
                         tg.sendData(JSON.stringify(data));
                    });
                   
                } else {
                    // Если отменили, убираем "ОЖИДАНИЕ" или помечаем как отмененное
                    const posEl = document.getElementById(newPosId);
                    if (posEl) posEl.remove();
                    tg.showAlert("Сделка отменена.");
                }
            });
        }

        // Инициализация при загрузке
        updateChart(); 
    </script>
</body>
</html>
