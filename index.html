<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --accent: #f0b90b; --green: #02d1a0; --red: #f6465d; --text: #eaecef; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .balance-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { flex: 1; text-align: center; padding: 10px; background: #161a1e; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .tab.active { color: var(--accent); background: var(--card); border: 1px solid var(--accent); }
        .chart-container { height: 250px; border-radius: 12px; overflow: hidden; border: 1px solid #333; margin-bottom: 10px; }
        .trade-box { background: var(--card); padding: 15px; border-radius: 12px; }
        select, input { width: 100%; background: #2b3139; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        .leverage-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .lev-btn { background: #2b3139; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; font-size: 11px; }
        .lev-btn.active { background: var(--accent); color: black; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button.action { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }
    </style>
</head>
<body>
    <div class="balance-box">
        <div style="font-size: 11px; color: #848e9c;">Доступный баланс</div>
        <div style="font-size: 24px; font-weight: bold;">$<span id="bal">10,000.00</span></div>
    </div>

    <div class="tabs">
        <div class="tab active">Торговля</div>
        <div class="tab">Сделки</div>
        <div class="tab">История</div>
    </div>

    <div class="chart-container">
        <iframe id="tv" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <div class="trade-box">
        <label style="font-size: 11px;">Выберите монету</label>
        <select id="asset" onchange="document.getElementById('tv').src='https://s.tradingview.com/widgetembed/?symbol=BINANCE:'+this.value+'&theme=dark'">
            <option value="BTCUSDT">BTC / USDT</option>
            <option value="ETHUSDT">ETH / USDT</option>
            <option value="SOLUSDT">SOL / USDT</option>
            <option value="XRPUSDT">XRP / USDT</option>
            <option value="ADAUSDT">ADA / USDT</option>
            <option value="DOGEUSDT">DOGE / USDT</option>
            <option value="DOTUSDT">DOT / USDT</option>
            <option value="MATICUSDT">MATIC / USDT</option>
            <option value="LTCUSDT">LTC / USDT</option>
            <option value="SHIBUSDT">SHIB / USDT</option>
            <option value="TRXUSDT">TRX / USDT</option>
            <option value="AVAXUSDT">AVAX / USDT</option>
        </select>

        <div class="leverage-grid">
            <button class="lev-btn active" onclick="setL(1, this)">x1</button>
            <button class="lev-btn" onclick="setL(10, this)">x10</button>
            <button class="lev-btn" onclick="setL(50, this)">x50</button>
            <button class="lev-btn" onclick="setL(125, this)">x125</button>
        </div>

        <input type="number" id="amt" value="100" style="margin-top:15px;">

        <div class="btn-group">
            <button class="action buy" onclick="send('LONG')">LONG</button>
            <button class="action sell" onclick="send('SHORT')">SHORT</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let lev = 1;
        function setL(v, e) {
            lev = v;
            document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
            e.classList.add('active');
        }
        function send(side) {
            const data = {
                action: side,
                symbol: document.getElementById('asset').value,
                amount: document.getElementById('amt').value,
                lev: lev
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
