<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>MiniApp</title>
<style>
body {font-family: Arial, sans-serif; background:#f4f6fb; margin:8px;}
.card {background:#fff; border-radius:10px; padding:10px; box-shadow:0 4px 10px rgba(0,0,0,0.08); margin-bottom:10px;}
.tab {display:flex; gap:5px; margin-bottom:8px;}
.tab button {flex:1; border:none; border-radius:8px; padding:8px; background:#2563eb; color:#fff; cursor:pointer;}
input, select, textarea {width:100%; margin:4px 0; padding:8px; border:1px solid #ccc; border-radius:6px;}
button.action {background:#2563eb; color:#fff; border:none; border-radius:7px; padding:10px; width:100%; cursor:pointer;}
iframe {width:100%; min-height:280px; border:1px solid #ddd; border-radius:8px;}
</style>
</head>
<body>
<div class="tab">
  <button onclick="show('trade')">Торговля</button>
  <button onclick="show('deposit')">Депозит</button>
  <button onclick="show('withdraw')">Вывод</button>
  <button onclick="show('support')">Поддержка</button>
</div>

<div class="card" id="chartBlock">
  <h3>График цены (BTC/USDT)</h3>
  <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_1&symbol=COINBASE:BTCUSD&interval=D&hidetoptoolbar=1&theme=light" scrolling="no"></iframe>
</div>

<div class="card" id="trade">
  <h3>Открыть сделку</h3>
  <select id="coin"><option value="BTC">BTC</option><option value="ETH">ETH</option><option value="USDT">USDT</option></select>
  <input id="amount" type="number" placeholder="Сумма" value="10">
  <input id="price" type="number" placeholder="Цена" value="1">
  <select id="direction"><option value="long">Long</option><option value="short">Short</option></select>
  <button class="action" onclick="sendTrade()">Открыть сделку</button>
</div>

<div class="card" id="deposit" style="display:none;">
  <h3>Депозит</h3>
  <input id="dep_amount" type="number" placeholder="Сумма" value="20">
  <select id="dep_method"><option value="crypto">Crypto</option><option value="card">Карта</option></select>
  <button class="action" onclick="sendDeposit()">Пополнить</button>
</div>

<div class="card" id="withdraw" style="display:none;">
  <h3>Вывод</h3>
  <input id="w_amount" type="number" placeholder="Сумма" value="10">
  <input id="w_wallet" type="text" placeholder="Кошелек">
  <button class="action" onclick="sendWithdraw()">Вывести</button>
</div>

<div class="card" id="support" style="display:none;">
  <h3>Техподдержка</h3>
  <textarea id="support_text" rows="4" placeholder="Опишите проблему"></textarea>
  <button class="action" onclick="sendSupport()">Отправить</button>
</div>

<script>
const tg = window.Telegram.WebApp; tg.expand();
function show(id){["trade","deposit","withdraw","support"].forEach(x=>document.getElementById(x).style.display = x===id?"block":"none");}
function sendTrade(){tg.sendData(JSON.stringify({action:"trade", coin:document.getElementById("coin").value, amount:document.getElementById("amount").value, price:document.getElementById("price").value, direction:document.getElementById("direction").value}));}
function sendDeposit(){tg.sendData(JSON.stringify({action:"deposit", amount:document.getElementById("dep_amount").value, method:document.getElementById("dep_method").value}));}
function sendWithdraw(){tg.sendData(JSON.stringify({action:"withdraw", amount:document.getElementById("w_amount").value, wallet:document.getElementById("w_wallet").value}));}
function sendSupport(){tg.sendData(JSON.stringify({action:"support", message:document.getElementById("support_text").value}));}
</script>
</body>
</html>
